{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Patient Registration
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text"
                               name="username"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Age</label>
                        <input type="number"
                               name="age"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                            <input
                            type="email"
                             name="email"
                            class="form-control"
                                required
                            >
                        </div>

                    <div class="mb-3">
                        <label>Gender</label>

                        <select name="gender"
                                class="form-control">

                            <option value="Male">Male</option>

                            <option value="Female">Female</option>

                        </select>
                    </div>

                    <button class="btn btn-success w-100">
                        Register
                    </button>

                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="{% url 'login' %}">
                        Login
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
